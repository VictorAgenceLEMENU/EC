<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>25 ANS EASY CASH</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
 
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #fe002c;
    }
 
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
      position: relative;
    }
 
    /* Grain texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.3;
    }
 
    /* Decorative diagonal stripes top-left */
    .deco-tl {
      position: fixed;
      top: -40px;
      left: -40px;
      width: 180px;
      height: 180px;
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
    }
 
    /* Decorative diagonal stripes bottom-right */
    .deco-br {
      position: fixed;
      bottom: -40px;
      right: -40px;
      width: 180px;
      height: 180px;
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
      transform: rotate(180deg);
    }
 
    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      width: 100%;
      padding: 0 16px;
    }
 
    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 5vw, 4rem);
      letter-spacing: 0.12em;
      color: #fff;
      text-shadow:
        3px 3px 0px rgba(0,0,0,0.25),
        0 0 40px rgba(255,255,255,0.15);
      animation: fadeDown 0.7s ease both;
    }
 
    .player-wrapper {
      width: 65%;
      position: relative;
      border-radius: 4px;
      overflow: hidden;
      box-shadow:
        0 0 0 3px rgba(255,255,255,0.2),
        0 30px 80px rgba(0, 0, 0, 0.5),
        0 8px 24px rgba(0, 0, 0, 0.4);
      animation: fadeUp 0.7s 0.15s ease both;
      background: #000;
    }
 
    /* 16:9 aspect ratio */
    .player-wrapper::before {
      content: '';
      display: block;
      padding-top: 56.25%;
    }
 
    .player-wrapper iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
 
    /* Subtle white line accent under player */
    .accent-line {
      width: 65%;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
      animation: fadeUp 0.7s 0.3s ease both;
    }
 
    .tagline {
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      font-size: clamp(0.7rem, 1.5vw, 0.9rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
      animation: fadeUp 0.7s 0.4s ease both;
    }
 
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
 
  <!-- Decorative SVG corners -->
  <svg class="deco-tl" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
    <line x1="0" y1="20" x2="20" y2="0" stroke="white" stroke-width="2"/>
    <line x1="0" y1="45" x2="45" y2="0" stroke="white" stroke-width="2"/>
    <line x1="0" y1="70" x2="70" y2="0" stroke="white" stroke-width="2"/>
    <line x1="0" y1="95" x2="95" y2="0" stroke="white" stroke-width="2"/>
    <line x1="0" y1="120" x2="120" y2="0" stroke="white" stroke-width="2"/>
    <line x1="0" y1="145" x2="145" y2="0" stroke="white" stroke-width="2"/>
    <line x1="0" y1="170" x2="170" y2="0" stroke="white" stroke-width="2"/>
    <line x1="10" y1="180" x2="180" y2="10" stroke="white" stroke-width="2"/>
    <line x1="35" y1="180" x2="180" y2="35" stroke="white" stroke-width="2"/>
    <line x1="60" y1="180" x2="180" y2="60" stroke="white" stroke-width="2"/>
    <line x1="85" y1="180" x2="180" y2="85" stroke="white" stroke-width="2"/>
    <line x1="110" y1="180" x2="180" y2="110" stroke="white" stroke-width="2"/>
    <line x1="135" y1="180" x2="180" y2="135" stroke="white" stroke-width="2"/>
    <line x1="160" y1="180" x2="180" y2="160" stroke="white" stroke-width="2"/>
  </svg>
 
  <svg class="deco-br" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
    <line x1="0" y1="20" x2="20" y2="0" stroke="white" stroke-width="2"/>
    <line x1="0" y1="45" x2="45" y2="0" stroke="white" stroke-width="2"/>
    <line x1="0" y1="70" x2="70" y2="0" stroke="white" stroke-width="2"/>
    <line x1="0" y1="95" x2="95" y2="0" stroke="white" stroke-width="2"/>
    <line x1="0" y1="120" x2="120" y2="0" stroke="white" stroke-width="2"/>
    <line x1="0" y1="145" x2="145" y2="0" stroke="white" stroke-width="2"/>
    <line x1="0" y1="170" x2="170" y2="0" stroke="white" stroke-width="2"/>
    <line x1="10" y1="180" x2="180" y2="10" stroke="white" stroke-width="2"/>
    <line x1="35" y1="180" x2="180" y2="35" stroke="white" stroke-width="2"/>
    <line x1="60" y1="180" x2="180" y2="60" stroke="white" stroke-width="2"/>
    <line x1="85" y1="180" x2="180" y2="85" stroke="white" stroke-width="2"/>
    <line x1="110" y1="180" x2="180" y2="110" stroke="white" stroke-width="2"/>
    <line x1="135" y1="180" x2="180" y2="135" stroke="white" stroke-width="2"/>
    <line x1="160" y1="180" x2="180" y2="160" stroke="white" stroke-width="2"/>
  </svg>
 
  <div class="container">
    <h1 class="title">Lecteur Vidéo</h1>
 
    <div class="player-wrapper">
      <iframe
        src="https://www.youtube.com/watch?v=AwHut0I8P7w"
        title="YouTube video player"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen>
      </iframe>
    </div>
 
    <div class="accent-line"></div>
    <p class="tagline">YouTube · Intégration native</p>
  </div>
 
</body>
</html>
